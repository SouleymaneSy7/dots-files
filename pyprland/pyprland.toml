# ═══════════════════════════════════════════════════════════
# PYPRLAND - Hyprland Extension Daemon Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Extends Hyprland with non-native features. Here: a terminal
#   scratchpad — a hidden Ghostty window that slides in from
#   the top with Super+grave. The session persists between
#   toggles (history and processes).
#
# Location:
#   ~/.config/pyprland/pyprland.toml
#
# Installation:
#   yay -S pyprland
#
# Usage:
#   Super + grave  (toggle scratchpad terminal)
#
# Hyprland integration:
#   In hyprland.conf:
#     exec-once = pypr
#     bind = $mainMod, grave, exec, pypr toggle term
#
# Dependencies:
#   - ghostty            (scratchpad terminal)
#   - hyprland           (compositor — required)
#
# See also:
#   hyprland/hyprland.conf  (autostart + keybinding)
#
# Documentation:
#   https://hyprland-community.github.io/pyprland/

[pyprland]
# List of plugins to load on startup.
plugins = ["scratchpads"]

# ─── Scratch Terminal ───────────────────────────────────────
# A hidden Ghostty instance that slides in from the top of the screen.
# The session is reused between toggles: the working directory,
# shell history, and any running processes are preserved.
#
# The class must match the windowrule defined in hyprland.conf:
#   windowrule = float, class:^(pypr-term)$
[scratchpads.term]
animation = "fromTop"                      # Slide in from the top edge
command   = "ghostty --class=pypr-term"   # app_id must match the windowrule class
class     = "pypr-term"
size      = "80% 70%"                      # 80% screen width, 70% screen height
position  = "10% 10%"                      # Centered with 10% margin from each edge
