# ═══════════════════════════════════════════════════════════
# YAZI - Theme (Catppuccin Macchiato)
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Visual theme for yazi using the Catppuccin Macchiato palette.
#   Defines colors for the manager, status bar, popups,
#   notifications, and syntax highlighting.
#
# Location:
#   ~/.config/yazi/yazi-theme.toml
#
# Installation:
#   ya pack -a catppuccin/yazi:macchiato  (official flavor — recommended)
#   then add use = "catppuccin-macchiato" in [flavor]
#
# Theme:
#   Catppuccin Macchiato
#
# Dependencies:
#   - Catppuccin Macchiato for bat  (syntax highlighting in preview)
#     mkdir -p "$(bat --config-dir)/themes"
#     curl -fsSL ... ~/themes/Catppuccin%20Macchiato.tmTheme
#     bat cache --build
#
# See also:
#   yazi/yazi.toml         (main configuration)
#   yazi/yazi-keymap.toml  (keyboard shortcuts)
#
# Documentation:
#   https://yazi-rs.github.io/docs/configuration/theme

[flavor]
# Official Catppuccin flavor. Remove this line and use the manual
# color blocks below if you prefer not to install the flavor package.
use = "catppuccin-macchiato"

# ─── Manager ──────────────────────────────────────────────
[manager]
cwd = { fg = "#8aadf4" }  # Current working directory path: blue

# File and directory entry states
hovered   = { fg = "#24273a", bg = "#8aadf4" }  # Hovered entry: blue background
previewed = { bg = "#363a4f" }                   # File open in preview: surface0 background
selected  = { fg = "#a6da95", bold = true }       # Selected entries: green
copied    = { fg = "#eed49f", bold = true }        # Copied entries: yellow
cut       = { fg = "#ed8796", bold = true }        # Cut entries: red

border_symbol = "│"
border_style  = { fg = "#494d64" }  # Border: surface1

# ─── Status Bar ───────────────────────────────────────────
[status]
separator_open  = ""   # Left powerline separator
separator_close = ""   # Right powerline separator
separator_style = { fg = "#1e2030", bg = "#1e2030" }

mode_normal = { fg = "#24273a", bg = "#8aadf4", bold = true }   # Normal mode: blue
mode_select = { fg = "#24273a", bg = "#a6da95", bold = true }   # Select mode: green
mode_unset  = { fg = "#24273a", bg = "#eed49f", bold = true }   # Search mode: yellow

progress_label  = { fg = "#cad3f5", bold = true }
progress_normal = { fg = "#8aadf4", bg = "#1e2030" }
progress_error  = { fg = "#ed8796", bg = "#1e2030" }

# ─── Input (Rename / Create Dialogs) ─────────────────────
[input]
border   = { fg = "#8aadf4" }
title    = { fg = "#8aadf4" }
value    = { fg = "#cad3f5" }
selected = { fg = "#24273a", bg = "#c6a0f6" }  # Selected text: mauve

# ─── Completion Popup ─────────────────────────────────────
[completion]
border   = { fg = "#494d64" }
active   = { fg = "#24273a", bg = "#c6a0f6" }  # Active suggestion: mauve
inactive = { fg = "#a5adcb" }

# ─── Task Panel ───────────────────────────────────────────
[tasks]
border  = { fg = "#494d64" }
title   = { fg = "#c6a0f6" }
hovered = { bg = "#363a4f", bold = true }

# ─── Which-Key Popup ──────────────────────────────────────
[which]
mask            = { bg = "#1e2030" }
cand            = { fg = "#8aadf4" }
rest            = { fg = "#a5adcb" }
desc            = { fg = "#c6a0f6" }
separator       = "  "
separator_style = { fg = "#494d64" }

# ─── Confirm Dialogs ──────────────────────────────────────
# Red border and title make destructive confirmations visually distinct.
[confirm]
border  = { fg = "#ed8796" }
title   = { fg = "#ed8796" }
content = { fg = "#cad3f5" }
list    = { fg = "#a5adcb" }

btn_yes    = { fg = "#24273a", bg = "#a6da95", bold = true }   # Yes button: green
btn_no     = { fg = "#24273a", bg = "#ed8796", bold = true }   # No button:  red
btn_labels = ["  Yes ", "  No  "]

# ─── Notifications ────────────────────────────────────────
[notify]
title_info  = { fg = "#a6da95" }  # Info:    green
title_warn  = { fg = "#eed49f" }  # Warning: yellow
title_error = { fg = "#ed8796" }  # Error:   red
icon_info   = ""
icon_warn   = ""
icon_error  = ""

# ─── Syntax Highlighting in Preview ──────────────────────
# yazi uses syntect for text file previews.
# The Catppuccin Macchiato theme for bat must be installed:
#   mkdir -p "$(bat --config-dir)/themes"
#   curl -fsSL https://github.com/catppuccin/bat/raw/main/themes/Catppuccin%20Macchiato.tmTheme \
#     -o "$(bat --config-dir)/themes/Catppuccin Macchiato.tmTheme"
#   bat cache --build
[syntect]
theme = "Catppuccin Macchiato"
