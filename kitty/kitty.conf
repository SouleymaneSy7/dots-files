# ═══════════════════════════════════════════════════════════
# KITTY - Terminal Emulator Configuration
# ═══════════════════════════════════════════════════════════
#
# Theme:    Catppuccin Kitty Macchiato
# Author:   Catppuccin Org
# License:  MIT
# Upstream: https://github.com/catppuccin/kitty/blob/main/themes/macchiato.conf
# Blurb:    Soothing pastel theme for the high-spirited!
#
# This file configures Kitty's font rendering, color palette,
# window borders, tab bar, and terminal ANSI colors.

# vim:ft=kitty
# vim:fileencoding=utf-8:ft=conf:foldmethod=marker

# ─── Font Settings ─────────────────────────────────────────
# Alternative font definitions (commented out in favor of BEGIN_KITTY_FONTS below).
# Uncomment these if you prefer to define fonts manually without the Kitty font manager.
# font_family      Fira Code Semi Bold
# bold_font        Fira Code Bold
# italic_font      Fira Code Italic
# bold_italic_font Fira Code Bold Italic

# Base font size in points.
font_size 12.0

# Increase line height to 120% of the font's natural line height.
# Adds breathing room between lines for improved readability.
adjust_line_height 120%

# OpenType feature flags for Fira Code Regular.
# Each +ssXX enables a stylistic set with alternate glyph designs.
# +zero = slashed zero, +onum = oldstyle numerals.
font_features FiraCode-Regular +ss01 +ss02 +ss03 +ss04 +ss05 +ss07 +ss08 +zero +onum

# ─── Base Colors ───────────────────────────────────────────
foreground           #cad3f5  # Default text color (Macchiato text)
background           #24273a  # Terminal background color (Macchiato base)
selection_foreground #24273a  # Text color inside a selected region (inverted)
selection_background #f4dbd6  # Background color of selected text (Macchiato rosewater)

# ─── Cursor Colors ─────────────────────────────────────────
cursor            #f4dbd6  # Cursor block/bar color (Macchiato rosewater)
cursor_text_color #24273a  # Color of the character underneath the cursor

# ─── URL Colors ────────────────────────────────────────────
# Underline color applied to URLs when hovering with the mouse.
url_color #f4dbd6  # Macchiato rosewater

# ─── Window Border Colors ──────────────────────────────────
active_border_color   #b7bdf8  # Border color of the focused Kitty window (Macchiato lavender)
inactive_border_color #6e738d  # Border color of unfocused windows (Macchiato overlay0)
bell_border_color     #eed49f  # Border color when the terminal bell rings (Macchiato yellow)

# ─── OS Window Titlebar ────────────────────────────────────
# "system" uses the OS/compositor default titlebar color.
wayland_titlebar_color system  # Titlebar color on Wayland compositors
macos_titlebar_color   system  # Titlebar color on macOS

# ─── Tab Bar Colors ────────────────────────────────────────
active_tab_foreground   #181926  # Text color of the active tab (Macchiato crust)
active_tab_background   #c6a0f6  # Background of the active tab (Macchiato mauve)
inactive_tab_foreground #cad3f5  # Text color of inactive tabs (Macchiato text)
inactive_tab_background #1e2030  # Background of inactive tabs (Macchiato mantle)
tab_bar_background      #181926  # Background of the tab bar itself (Macchiato crust)

# ─── Mark Colors ───────────────────────────────────────────
# Colors applied to marked text regions (set via keyboard shortcuts).
# Three independent mark slots are available for multi-mark workflows.
mark1_foreground #24273a  # Text color for mark slot 1
mark1_background #b7bdf8  # Highlight color for mark slot 1 (Macchiato lavender)
mark2_foreground #24273a  # Text color for mark slot 2
mark2_background #c6a0f6  # Highlight color for mark slot 2 (Macchiato mauve)
mark3_foreground #24273a  # Text color for mark slot 3
mark3_background #7dc4e4  # Highlight color for mark slot 3 (Macchiato sapphire)

# ─── ANSI Color Palette (16 Colors) ────────────────────────
# Defines the standard 16-color terminal palette used by CLI apps.
# color0-7 = normal colors, color8-15 = bright variants.

# Black
color0 #494d64   # Normal black  (Macchiato surface1)
color8 #5b6078   # Bright black  (Macchiato surface2)

# Red
color1 #ed8796   # Normal red    (Macchiato red)
color9 #ed8796   # Bright red    (same shade)

# Green
color2  #a6da95  # Normal green  (Macchiato green)
color10 #a6da95  # Bright green  (same shade)

# Yellow
color3  #eed49f  # Normal yellow (Macchiato yellow)
color11 #eed49f  # Bright yellow (same shade)

# Blue
color4  #8aadf4  # Normal blue   (Macchiato blue)
color12 #8aadf4  # Bright blue   (same shade)

# Magenta
color5  #f5bde6  # Normal magenta (Macchiato pink)
color13 #f5bde6  # Bright magenta (same shade)

# Cyan
color6  #8bd5ca  # Normal cyan   (Macchiato teal)
color14 #8bd5ca  # Bright cyan   (same shade)

# White
color7  #b8c0e0  # Normal white  (Macchiato subtext1)
color15 #a5adcb  # Bright white  (Macchiato subtext0, slightly dimmer)

# ─── Tab Bar Config (optional) ─────────────────────────────
# Uncomment to customize the tab bar layout and style.
# tab_bar_min_tabs        1               # Minimum number of tabs before the bar appears
# tab_bar_edge            bottom          # Display tab bar at the bottom of the window
# tab_bar_style           powerline       # Use powerline-style tab separators
# tab_powerline_style     slanted         # Slanted powerline separator shape
# tab_title_template      {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ─── Font Definitions (Kitty Font Manager) ─────────────────
# BEGIN_KITTY_FONTS block is managed by the `kitty +kitten choose-fonts` tool.
# Manual edits here may be overwritten by the font picker.
# BEGIN_KITTY_FONTS
font_family      family='Fira Code' postscript_name=FiraCode-Regular  # Regular weight
bold_font        family='Fira Code' postscript_name=FiraCode-Bold      # Bold weight
italic_font      auto                                                   # Auto-select italic variant
bold_italic_font auto                                                   # Auto-select bold italic variant
# END_KITTY_FONTS
