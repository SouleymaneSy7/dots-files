# ═══════════════════════════════════════════════════════════
# MPV - Media Player Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   mpv is the video player used by Yazi and set as the default
#   for video and audio in mimeapps.list. Configures video output,
#   audio, subtitles, and performance settings.
#
# Location:
#   ~/.config/mpv/mpv.conf
#
# Installation:
#   sudo pacman -S mpv
#
# Usage:
#   mpv video.mp4
#   mpv ~/Videos/
#
# Reload:
#   Restart mpv (no hot reload)
#
# Dependencies:
#   - mesa (Vulkan support for gpu-next)
#   - yazi (uses mpv as default video player)
#
# See also:
#   mpv/input.conf          (keybindings)
#   yazi/yazi.toml          (Yazi integration)
#
# Documentation:
#   https://mpv.io/manual/stable/

# ─── Video Output ──────────────────────────────────────────
# gpu-next is the modern Vulkan-based renderer (replaces gpu).
# Falls back to gpu if Vulkan is not available.
vo = gpu-next

# Use Vulkan for hardware acceleration on modern AMD/Intel/NVIDIA.
# Change to "opengl" if Vulkan causes issues.
gpu-api = vulkan

# High quality upscaling algorithm for video below native resolution.
scale  = ewa_lanczossharp
cscale = ewa_lanczossharp
dscale = mitchell

# Temporal dithering reduces banding on 8-bit displays.
dither-depth = auto

# ─── Hardware Decoding ─────────────────────────────────────
# "auto-safe" uses hardware decoding when available, falls back to CPU.
# Remove or set to "no" if you experience glitches.
hwdec = auto-safe

# ─── Audio ─────────────────────────────────────────────────
# PipeWire is the audio server in this project.
ao = pipewire

# Normalize audio volume across files.
af = loudnorm

# ─── Subtitles ─────────────────────────────────────────────
sub-auto     = fuzzy   # Load subtitle files with similar names
sub-font     = "Rec Mono Linear"
sub-font-size = 40
sub-color    = "#cad3f5"  # Catppuccin Macchiato text
sub-border-color = "#24273a"  # Catppuccin Macchiato base
sub-border-size  = 2
sub-shadow-offset = 1

# ─── OSD (On-Screen Display) ───────────────────────────────
# Colors approximate Catppuccin Macchiato (OSD uses ASS color format).
osd-font              = "Rec Mono Linear"
osd-font-size         = 32
osd-color             = "#cad3f5"   # text
osd-border-color      = "#24273a"   # base
osd-shadow-color      = "#000000"
osd-border-size       = 1.5
osd-bar-h             = 2           # Progress bar height (percent of OSD height)
osd-bar-align-y       = -1          # Progress bar at the bottom

# Show OSD when the seek bar is used.
osd-on-seek           = msg-bar

# Duration OSD info is shown after commands (milliseconds).
osd-duration          = 1500

# ─── Window ────────────────────────────────────────────────
# Start in a windowed state, not fullscreen.
fullscreen = no

# Keep the window above other windows when playing.
ontop = no


# Do not close the window when the file finishes playing.
# Useful when using mpv as a still-image viewer.
keep-open = no

# ─── Playback ──────────────────────────────────────────────
# Remember the playback position in recently watched files.
# Position is stored in ~/.local/share/mpv/watch_later/
watch-later-directory = ~/.local/share/mpv/watch_later

# Resume from the saved position if the file was partially watched.
save-position-on-quit = yes

# ─── Behavior ──────────────────────────────────────────────
# Automatically load external files with matching names:
# cover art (cover.jpg), chapter files (.xml), etc.
# Values: "yes" = load all, "no" = load none, "filter" = load only playable media
autocreate-playlist = filter

# Loop playlist when it ends.
loop-playlist = no

# Volume is a percentage (100 = original volume).
volume = 100
volume-max = 150   # Allow boosting beyond 100% for quiet media
