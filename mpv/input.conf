# ═══════════════════════════════════════════════════════════
# MPV - Input / Keybindings Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Custom keybindings for mpv, using Vim-style navigation
#   where possible. These override mpv's defaults.
#   See `mpv --input-keylist` for all available keys.
#
# Location:
#   ~/.config/mpv/input.conf
#
# Installation:
#   sudo pacman -S mpv
#
# Usage:
#   Loaded automatically when mpv starts.
#   Keybindings reference: see inline comments below.
#
# Reload:
#   Restart mpv (no hot reload)
#
# See also:
#   mpv/mpv.conf  (main configuration)
#
# Documentation:
#   https://mpv.io/manual/stable/#command-interface

# ─── Playback ──────────────────────────────────────────────
SPACE        cycle pause                   # Toggle play / pause
p            cycle pause                   # Alternative pause toggle
q            quit                          # Quit
Q            quit-watch-later              # Quit and save position

# ─── Seeking ───────────────────────────────────────────────
# Small seeks (arrow keys or l/h)
l            seek 5                        # Seek forward 5 seconds
h            seek -5                       # Seek backward 5 seconds
RIGHT        seek 5
LEFT         seek -5

# Large seeks (shift)
L            seek 60                       # Seek forward 1 minute
H            seek -60                      # Seek backward 1 minute
SHIFT+RIGHT  seek 60
SHIFT+LEFT   seek -60

# Frame-by-frame stepping (useful for video editing / screenshots)
.            frame-step                    # Step forward one frame
,            frame-back-step              # Step backward one frame

# ─── Volume ────────────────────────────────────────────────
j            add volume -5                 # Volume down
k            add volume 5                  # Volume up
DOWN         add volume -5
UP           add volume 5
m            cycle mute                    # Toggle mute

# ─── Speed ─────────────────────────────────────────────────
]            multiply speed 1.1            # Speed up by 10%
[            multiply speed 0.9            # Slow down by 10%
{            multiply speed 0.5            # Half speed
}            multiply speed 2.0            # Double speed
BS           set speed 1.0                 # Reset to normal speed

# ─── Subtitles ─────────────────────────────────────────────
v            cycle sub-visibility          # Toggle subtitle display
V            cycle sub                     # Switch to next subtitle track
z            add sub-delay -0.1            # Subtitle earlier by 0.1s
Z            add sub-delay  0.1            # Subtitle later by 0.1s
x            add sub-scale  0.1            # Increase subtitle size
X            add sub-scale -0.1            # Decrease subtitle size

# ─── Audio Track ───────────────────────────────────────────
a            cycle audio                   # Switch to next audio track
A            cycle audio down              # Switch to previous audio track

# ─── Window ────────────────────────────────────────────────
f            cycle fullscreen              # Toggle fullscreen
t            cycle ontop                   # Toggle always-on-top
w            add panscan -0.1              # Decrease video crop
W            add panscan  0.1             # Increase video crop
e            add video-zoom -0.1           # Zoom out
E            add video-zoom  0.1           # Zoom in
r            set video-pan-y  0.0          # Reset pan / zoom
             set video-pan-x  0.0
             set video-zoom   0.0

# ─── Playlist ──────────────────────────────────────────────
n            playlist-next                 # Next file in playlist
N            playlist-prev                 # Previous file in playlist
>            playlist-next                 # Alternative next
<            playlist-prev                 # Alternative prev

# ─── Screenshot ────────────────────────────────────────────
# Screenshots saved to ~/Pictures/Screenshots/ by default (set in mpv.conf)
s            screenshot                    # Screenshot of current frame
S            screenshot video              # Screenshot without subtitles
Alt+s        screenshot window             # Screenshot including OSD

# ─── OSD ───────────────────────────────────────────────────
o            no-osd cycle-values osd-level 3 1   # Toggle OSD on/off
O            show-progress                        # Show progress bar briefly
i            script-binding stats/display-stats   # Show detailed stats overlay
I            script-binding stats/display-stats-toggle
