# ═══════════════════════════════════════════════════════════
# LAZYGIT - Git TUI Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Git TUI with Vim navigation. Configured with the Catppuccin
#   Macchiato theme, delta as the diff pager, and custom
#   keybindings.
#
# Location:
#   ~/.config/lazygit/config.yml
#
# Installation:
#   sudo pacman -S lazygit
#
# Usage:
#   lazygit
#   Or from Neovim via LazyVim: <leader>gg
#
# Dependencies:
#   - git-delta    (diff pager — must be installed)
#   - nvim         (default editor for opening files)
#
# See also:
#   git/.gitconfig  (global Git config, same delta pager)
#
# Documentation:
#   https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

# ─── Git ───────────────────────────────────────────────────
git:
  # Show all branches including remote ones in the branch list.
  allBranchesLogCmd: "git log --oneline --graph --decorate --all"

  # Use delta for paging diffs inside lazygit.
  # This gives syntax highlighting consistent with git diff in the terminal.
  paging:
    colorArg: always
    pager: delta --dark --paging=never --side-by-side --syntax-theme="Catppuccin Macchiato"
    useConfig: false # Do not inherit the global pager — lazygit manages it directly

  # Automatically fetch remote changes every 5 minutes in the background.
  autoFetch: true
  autoRefresh: true
  fetchAll: true

  # Show the number of commits behind/ahead of the remote.
  branchLogCmd: "git log --oneline --graph --decorate --color=always --abbrev-commit HEAD..{{branchName}} 2>/dev/null || git log --oneline --graph --decorate --color=always --abbrev-commit {{branchName}}"

  # Parse emoji shortcodes in commit messages (e.g. :bug: → 🐛)
  parseEmoji: true

  # Commit message templates
  commitPrefix:
    - pattern: "^feature.*"
      replace: "feat: "
    - pattern: "^fix.*"
      replace: "fix: "
    - pattern: "^docs.*"
      replace: "docs: "

# ─── OS / Editor ───────────────────────────────────────────
os:
  # Open files from lazygit directly in Neovim.
  editPreset: "nvim"

  # Open lazygit's own editor in Neovim.
  edit: "nvim {{filename}}"
  editAtLine: "nvim +{{line}} {{filename}}"
  editAtLineAndWait: "nvim +{{line}} {{filename}}"
  open: "xdg-open {{filename}} >/dev/null 2>&1 &"

# ─── GUI ───────────────────────────────────────────────────
gui:
  # Show the file tree as a proper tree structure, not a flat list.
  expandedSidePanelWeight: 2

  # Branch panel shows 20 branches instead of 10.
  branchesListStyle: "tree"

  # Show commit author in the log.
  showAuthorDate: true

  # Display time as "2 hours ago" instead of absolute timestamps.
  timeFormat: ""
  shortTimeFormat: ""

  # Nerd Font icons for each status.
  nerdFontsVersion: "3"

  # Show file icons in the files panel.
  showFileIcons: true

  # Side panel widths (left : middle : right)
  sidePanelWidth: 0.2

  # Mouse support (scroll, click to focus panels)
  mouseEvents: true

  # Skip confirmation for destructive single-file operations.
  skipDiscardChangeWarning: false
  skipStashWarning: false

  # Keep the diff panel open at the bottom even when switching views.
  showBottomLine: true
  showCommandLog: false
  commandLogSize: 6

  # Wrap long lines in the diff panel.
  wrapLinesInDiffPanel: true

  # ─── Theme: Catppuccin Macchiato ───────────────────────────
  theme:
    activeBorderColor:
      - "#8aadf4" # blue — active panel border
      - bold
    inactiveBorderColor:
      - "#494d64" # surface1 — inactive panel border
    searchingActiveBorderColor:
      - "#eed49f" # yellow — border during search
      - bold
    optionsTextColor:
      - "#8aadf4" # blue — option labels at the bottom
    selectedLineBgColor:
      - "#363a4f" # surface0 — selected line background
    selectedRangeBgColor:
      - "#363a4f"
    cherryPickedCommitBgColor:
      - "#494d64" # surface1
    cherryPickedCommitFgColor:
      - "#c6a0f6" # mauve
    unstagedChangesColor:
      - "#ed8796" # red — unstaged file names
    defaultFgColor:
      - "#cad3f5" # text
    authorColors:
      "*": "#c6a0f6" # mauve — default author color

# ─── Keybindings ───────────────────────────────────────────
keybinding:
  universal:
    quit: "q"
    quit-alt1: "<c-c>"
    return: "<esc>"
    quitWithoutChangingDirectory: "Q"
    togglePanel: "<tab>"
    prevItem: "<up>"
    nextItem: "<down>"
    prevItem-alt: "k" # Vim: move up
    nextItem-alt: "j" # Vim: move down
    prevPage: ","
    nextPage: "."
    # gotoTop: "gg"
    gotoBottom: "G"
    prevBlock: "<left>"
    nextBlock: "<right>"
    prevBlock-alt: "h" # Vim: move to left panel
    nextBlock-alt: "l" # Vim: move to right panel
    scrollUpMain: "<pgup>"
    scrollDownMain: "<pgdown>"
    scrollUpMain-alt1: "K"
    scrollDownMain-alt1: "J"
    executeShell: ":"
    createRebaseOptionsMenu: "r"
    pushFiles: "P"
    pullFiles: "p"
    refresh: "R"
    createPatchOptionsMenu: "<c-p>"
    nextTab: "]"
    prevTab: "["
    nextScreenMode: "+"
    prevScreenMode: "_"
    undo: "z"
    redo: "<c-z>"
    filteringMenu: "<c-s>"
    diffingMenu: "W"
    copyToClipboard: "<c-o>"
    openRecentRepos: "<c-r>"
    submitEditorContent: "<a-enter>"
    extrasMenu: "@"
    toggleWhitespaceInDiffView: "<c-w>"
    increaseRenameSimilarityThreshold: ")"
    decreaseRenameSimilarityThreshold: "("

  files:
    commitChanges: "c"
    commitChangesWithoutHook: "C"
    amendLastCommit: "A"
    commitChangesWithEditor: "<c-e>"
    findBaseCommitForFixup: "<c-f>"
    confirmDiscard: "x"
    ignoreFile: "i"
    refreshFiles: "r"
    stashAllChanges: "s"
    viewStashOptions: "S"
    toggleStagedAll: "a"
    viewResetOptions: "D"
    fetch: "f"
    toggleTreeView: "`"
    openMergeTool: "m"
    openStatusFilter: "<c-b>"

  branches:
    createPullRequest: "o"
    viewPullRequestOptions: "O"
    copyPullRequestURL: "<c-y>"
    checkoutBranchByName: "c"
    forceCheckoutBranch: "F"
    rebaseBranch: "r"
    mergeIntoCurrentBranch: "M"
    viewGitFlowOptions: "i"
    fastForward: "f"
    createTag: "T"
    pushTag: "P"
    setUpstream: "u"
    fetchRemote: "f"
    sortOrder: "s"

  commits:
    squashDown: "s"
    renameCommit: "r"
    renameCommitWithEditor: "R"
    viewResetOptions: "g"
    markAsBaseCommit: "B"
    checkoutCommit: "<space>"
    resetCherryPick: "<c-R>"
    copyCommitAttributeToClipboard: "y"
    openLogMenu: "<c-l>"
    openInBrowser: "o"
    viewBisectOptions: "b"
    startInteractiveRebase: "i"

  stash:
    popStash: "g"
    renameStash: "r"
