# ═══════════════════════════════════════════════════════════
# SDDM - Display Manager Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Session manager (login screen) with the Catppuccin Macchiato
#   Blue theme. Drop-in file that overrides /etc/sddm.conf
#   without modifying it (safer, diff-able).
#
# Location:
#   /etc/sddm.conf.d/sddm.conf
#
# Installation:
#   sudo pacman -S sddm qt6-svg qt6-declarative qt5-quickcontrols2
#
# Usage:
#   sudo systemctl enable sddm
#   sudo systemctl start sddm
#
# Reload:
#   sudo systemctl restart sddm
#
# Theme installation:
#   Download catppuccin-macchiato-blue.zip from
#   https://github.com/catppuccin/sddm/releases/latest
#   sudo unzip → /usr/share/sddm/themes/
#
# Dependencies:
#   - qt6-svg            (SVG theme rendering)
#   - qt6-declarative    (Qt6 components)
#   - qt5-quickcontrols2 (Qt5 components)
#
# See also:
#   xorg/00-keyboard.conf  (keyboard layout for SDDM)
#
# Documentation:
#   https://wiki.archlinux.org/title/SDDM

# ─── Theme ────────────────────────────────────────────────
# Folder name under /usr/share/sddm/themes/
# Download from: https://github.com/catppuccin/sddm/releases/latest
# Unzip catppuccin-macchiato-blue.zip → move to /usr/share/sddm/themes/
[Theme]
Current=catppuccin-macchiato-blue

# ─── General ──────────────────────────────────────────────
[General]
# Power commands used by the shutdown/reboot buttons in the greeter.
HaltCommand=/usr/bin/systemctl poweroff
RebootCommand=/usr/bin/systemctl reboot

# Numlock state at the login screen.
# Options: none | on | off
Numlock=on

# ─── Users ────────────────────────────────────────────────
[Users]
# Pre-fill the username field with the last logged-in user.
RememberLastUser=true

# Default user shown in the username field on first boot.
# Uncomment and set to your actual username:
# DefaultUser=your_username

# Hide system accounts (UID < 1000) from the user list.
HideUsers=root

# ─── Session ──────────────────────────────────────────────
[Session]
# Default Wayland session to pre-select in the greeter.
# Points to /usr/share/wayland-sessions/hyprland.desktop
DefaultSession=hyprland

# ─── Autologin (disabled) ─────────────────────────────────
# Uncomment to skip the login screen entirely.
# Not recommended on a dual-boot machine.
#
# [Autologin]
# User=your_username
# Session=hyprland
# Relogin=false
