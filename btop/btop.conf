#? Config file for btop v. 1.3.0+

# ═══════════════════════════════════════════════════════════
# BTOP - System Monitor Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   System resource monitor (CPU, memory, disk, network) with
#   the Catppuccin Macchiato theme. Launched from Waybar by
#   clicking on the CPU module.
#
# Location:
#   ~/.config/btop/btop.conf
#
# Installation:
#   sudo pacman -S btop
#
# Usage:
#   btop
#   Or click on the CPU module in Waybar
#
# Theme installation:
#   mkdir -p ~/.config/btop/themes
#   curl -fsSL https://github.com/catppuccin/btop/raw/main/themes/catppuccin_macchiato.theme \
#     -o ~/.config/btop/themes/catppuccin_macchiato.theme
#
# Dependencies:
#   - Catppuccin Macchiato theme (.theme file in themes/)
#
# See also:
#   waybar/config.jsonc   (CPU module → click → btop)
#
# Documentation:
#   https://github.com/aristocratos/btop

# ─── Color Theme ───────────────────────────────────────────
# Path to the theme file. Use "Default" to reset to btop's built-in colors.
color_theme = "catppuccin_macchiato"

# ─── Terminal True Color ───────────────────────────────────
# true  = use 24-bit RGB colors (required for Catppuccin)
# false = fall back to 256 colors
truecolor = True

# ─── Force TTY Mode ────────────────────────────────────────
# false = use unicode box-drawing characters (prettier in Ghostty/Kitty)
# true  = use ASCII characters only (for broken terminals)
force_tty = False

# ─── Preset Layouts ────────────────────────────────────────
# Sets the default panel layout on first launch.
# Preset 0: CPU + mem + procs
# Preset 1: CPU history + net + procs
# Preset 2: CPU + mem + net + procs (recommended for most setups)
preset_layouts = [["cpu", "mem", "net", "proc"],["cpu", "proc"],["cpu", "mem", "proc"]]

# ─── Panel Ordering ────────────────────────────────────────
# Layout string: which panels appear in the main view.
# "cpu"  = CPU usage bars and history graph
# "mem"  = RAM, swap, and disk usage
# "net"  = network download/upload graphs
# "proc" = process list
shown_boxes = "cpu mem net proc"

# ─── Update Interval ───────────────────────────────────────
# How often the display refreshes in milliseconds.
# 2000ms (2 seconds) is smooth without excessive CPU overhead.
update_ms = 2000

# ─── Processes ─────────────────────────────────────────────
# Sort the process list by CPU usage by default.
proc_sorting = "cpu lazy"

# Show processes in tree view to see parent-child relationships.
proc_tree = False

# Show the full command path for each process.
proc_cmd = False

# Show per-thread CPU usage instead of per-process.
proc_per_core = False

# ─── CPU ───────────────────────────────────────────────────
# Show temperatures for each CPU core.
check_temp = True

# Display which CPU cores are active and their individual loads.
cpu_single_graph = False

# Always show the CPU frequency.
cpu_freq_only = False

# ─── Memory ────────────────────────────────────────────────
# Show disk usage for mounted filesystems in the memory panel.
mem_disks_io = True

# Show IO read/write activity for disks.
only_physical = True

# ─── Network ───────────────────────────────────────────────
# Automatically select the network interface with active traffic.
net_auto = True

# Sync the upload and download graph scales.
net_sync = False

# ─── Appearance ────────────────────────────────────────────
# Use rounded corners for panel boxes.
rounded_corners = True

# Show a clock in the top right of the screen.
# Format follows strftime: "%H:%M" = 24-hour clock without seconds.
clock_format = "%H:%M"

# Background drawn behind transparent terminals.
# "Default" uses the terminal's background color.
theme_background = True

# ─── Vim Keybindings ───────────────────────────────────────
# btop supports vim keys out of the box:
#   j/k      = scroll process list up/down
#   gg/G     = go to top/bottom of process list
#   /        = search processes
#   q        = quit
#   h/l      = switch between panels (when focused on the left sidebar)
#   F1-F5    = filter, sort, tree, reverse, collapsed views
