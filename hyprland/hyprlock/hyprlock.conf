# ═══════════════════════════════════════════════════════════
# HYPRLOCK - Lock Screen Configuration
# ═══════════════════════════════════════════════════════════
#
# Hyprlock is the official screen locker for Hyprland.
# This file configures the lock screen background, password input field,
# and text labels (clock and hostname) displayed while the screen is locked.
# Full documentation: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

# ─── Background ────────────────────────────────────────────
# Defines the wallpaper displayed on the lock screen.
# 'monitor' left empty means the background applies to all monitors.
background {
    monitor =
    path = /path/to/image  # Absolute path to the lock screen wallpaper image
}

# ─── Password Input Field ──────────────────────────────────
# The interactive field where the user types their password.
# Displays dots instead of characters for security.
input-field {
    monitor =                # Apply to all monitors (empty = all)
    size = 200, 50           # Width and height of the input field in pixels

    outline_thickness = 3   # Border thickness around the input field in pixels

    dots_size = 0.33         # Size of password dots relative to field height (0.2 - 0.8)
    dots_spacing = 0.15      # Spacing between dots relative to dot size (0.0 - 1.0)
    dots_center = true       # Center dots vertically within the input field
    dots_rounding = -1       # Dot shape: -1 = circle, -2 = follow field rounding

    # ─── Colors ──────────────────────────────────────────────
    outer_color = rgb(a6adc8) # Border color of the input field (Catppuccin subtext0)
    inner_color = rgb(11111b) # Background fill color of the input field (Catppuccin crust)
    font_color  = rgb(a6adc8) # Color of placeholder text and typed characters

    # ─── Empty Field Behavior ────────────────────────────────
    fade_on_empty = true      # Fade out the input field when it has been empty for a while
    fade_timeout = 1000       # Milliseconds of inactivity before fade_on_empty triggers

    # Placeholder text shown inside the field when no characters have been typed.
    # Supports Pango markup: <i> = italic.
    placeholder_text = <i>Input Password...</i>

    hide_input = false        # Show dots as the user types (false = visible dots)

    rounding = -1             # Corner rounding: -1 = fully rounded (oval/circle shape)

    # ─── Authentication Feedback ─────────────────────────────
    check_color = rgb(204, 136, 34)  # Border color while the password is being verified

    # Border and message color when authentication fails.
    fail_color = rgb(204, 34, 34)

    # Text displayed on authentication failure.
    # $FAIL = failure reason, $ATTEMPTS = number of failed attempts.
    # Supports Pango markup: <i> = italic, <b> = bold.
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    fail_transition = 100     # Transition duration in ms between normal and fail colors

    # ─── Lock State Colors ───────────────────────────────────
    # Override the outer border color when specific lock keys are active.
    # -1 means do not change the outer color for that lock state.
    capslock_color = -1       # Color when Caps Lock is active (-1 = no change)
    numlock_color  = -1       # Color when Num Lock is active (-1 = no change)
    bothlock_color = -1       # Color when both Caps and Num Lock are active (-1 = no change)

    invert_numlock = false    # If true, change color when Num Lock is OFF instead of on
    swap_font_color = false   # If true, swap font_color and inner_color when typing

    # ─── Position ────────────────────────────────────────────
    position = 0, -20  # Offset from anchor point in pixels (x, y)
    halign = center    # Horizontal alignment relative to the monitor
    valign = center    # Vertical alignment relative to the monitor
}

# ─── Clock Label ───────────────────────────────────────────
# Displays the current time, updated every second via a shell command.
# cmd[update:1000] re-runs the command every 1000ms to keep the clock live.
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"  # $TIME is a hyprlock built-in variable (HH:MM:SS)
    color = rgba(a6adc8)                  # Text color (Catppuccin subtext0 with full opacity)
    font_size = 96                        # Large font size for prominent clock display
    font_family = Fira Semibold           # Font family used for the clock text
    position = -100, 40                   # Offset from anchor point in pixels (x, y)
    halign = right                        # Align the label to the right of the monitor
    valign = bottom                       # Anchor the label to the bottom of the monitor
    shadow_passes = 5                     # Number of blur passes for the text drop shadow
    shadow_size = 10                      # Spread size of the text drop shadow in pixels
}

# ─── Hostname Label ────────────────────────────────────────
# Displays a static label identifying the machine on the lock screen.
label {
    monitor =
    text = Souleymane Computer's          # Static display name shown on the lock screen
    color = rgba(a6adc8)                  # Text color (Catppuccin subtext0 with full opacity)
    font_size = 32                        # Smaller font size, subordinate to the clock
    font_family = Fira Semibold           # Same font family as the clock for visual consistency
    position = -100, 196                  # Positioned above the clock label (higher y offset)
    halign = right                        # Align to the right of the monitor
    valign = bottom                       # Anchor to the bottom of the monitor
    shadow_passes = 5                     # Number of blur passes for the text drop shadow
    shadow_size = 10                      # Spread size of the text drop shadow in pixels
}
