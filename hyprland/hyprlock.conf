# ═══════════════════════════════════════════════════════════
# HYPRLOCK - Lock Screen Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Official lock screen for Hyprland. Configures the
#   background, password input field, clock, and hostname
#   displayed while locked.
#
# Location:
#   ~/.config/hypr/hyprlock.conf
#
# Installation:
#   sudo pacman -S hyprlock
#
# Usage:
#   hyprlock
#   Super + L  (keybinding in hyprland.conf)
#
# Notes:
#   Copy wallpapers from assets/wallpaper/ in the repository
#   to ~/Pictures/ — or place your own wallpaper there.
#
# Dependencies:
#   - hyprland   (compositor — required)
#
# See also:
#   hyprland/hyprland.conf   (keybinding Super+L)
#
# Documentation:
#   https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

# ─── Background ────────────────────────────────────────────
background {
    monitor =
    path    = ~/Pictures/wallpaper.jpg

    # Slight brightness reduction so the input field stands out against the wallpaper.
    brightness = 0.8
}

# ─── Password Input Field ──────────────────────────────────
# The interactive field where the user types their password.
input-field {
    monitor =
    size    = 200, 50

    outline_thickness = 3

    dots_size     = 0.33   # Size of password dots relative to field height (0.2–0.8)
    dots_spacing  = 0.15   # Spacing between dots relative to dot size (0.0–1.0)
    dots_center   = true   # Center dots vertically inside the input field
    dots_rounding = -1     # -1 = circle, -2 = follow field rounding

    # ─── Colors ──────────────────────────────────────────────
    outer_color = rgb(a6adc8)  # Catppuccin Macchiato subtext0
    inner_color = rgb(11111b)  # Catppuccin Macchiato crust
    font_color  = rgb(a6adc8)

    # ─── Empty Field Behavior ────────────────────────────────
    fade_on_empty    = true
    fade_timeout     = 1000  # Milliseconds before fade_on_empty triggers
    placeholder_text = <i>Password...</i>
    hide_input       = false
    rounding         = -1    # -1 = fully rounded

    # ─── Authentication Feedback ─────────────────────────────
    check_color      = rgb(eed49f)  # Catppuccin Macchiato yellow: verification in progress
    fail_color       = rgb(ed8796)  # Catppuccin Macchiato red: authentication failed
    fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition  = 150

    capslock_color   = rgb(eed49f)  # Yellow warning when Caps Lock is active
    numlock_color    = -1
    bothlock_color   = -1
    invert_numlock   = false
    swap_font_color  = false

    # ─── Position ────────────────────────────────────────────
    position = 0, -20
    halign   = center
    valign   = center
}

# ─── Clock Label ───────────────────────────────────────────
# Displays the current time, updated every second.
# Uses date instead of the built-in $TIME variable for broader compatibility.
label {
    monitor     =
    text        = cmd[update:1000] date '+%H:%M:%S'
    color       = rgba(a6adc8ff)  # Catppuccin Macchiato subtext0
    font_size   = 96
    font_family = Rec Mono Linear SemiBold
    position    = -100, 40
    halign      = right
    valign      = bottom
    shadow_passes = 5
    shadow_size   = 10
}

# ─── Hostname Label ────────────────────────────────────────
# Displays a static machine identifier on the lock screen.
label {
    monitor     =
    text        = $HOST
    color       = rgba(a6adc8ff)
    font_size   = 32
    font_family = Rec Mono Linear SemiBold
    position    = -100, 196
    halign      = right
    valign      = bottom
    shadow_passes = 5
    shadow_size   = 10
}
