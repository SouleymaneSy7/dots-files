# ═══════════════════════════════════════════════════════════
# HYPRIDLE - Idle Daemon Configuration
# ═══════════════════════════════════════════════════════════
#
# Hypridle is the official Hyprland idle daemon.
# It watches for user inactivity and triggers actions at configurable
# timeout intervals (dim screen, lock, turn off display, suspend, etc.).
# Changes take effect after restarting: `killall hypridle && hypridle &`

# ─── General Settings ──────────────────────────────────────
# Global behavior applied regardless of which listener fires.
general {
    # Prevent multiple hyprlock instances from spawning simultaneously.
    # pidof hyprlock checks if it is already running before launching a new one.
    lock_cmd = pidof hyprlock || hyprlock

    # Lock the session before the system suspends to sleep,
    # ensuring the screen is secured before power is cut.
    before_sleep_cmd = loginctl lock-session

    # Re-enable the display via DPMS after waking from sleep.
    # Without this, the user would need to press a key twice:
    # once to wake the system and once to turn the monitor back on.
    after_sleep_cmd = hyprctl dispatch dpms on
}

# ─── Listener 1: Dim Screen (60s) ──────────────────────────
# After 1 minute of inactivity, reduce the monitor backlight to near-minimum.
# A value above 0 is used to avoid completely turning off OLED panels,
# which can cause issues with some OLED monitor firmware.
listener {
    timeout = 60                                  # 1 minute of inactivity
    on-timeout = brightnessctl -s set 5           # Save current brightness, then set to 5%
    on-resume = brightnessctl -r                  # Restore previously saved brightness on activity
}

# ─── Listener 2: Lock Screen (120s) ────────────────────────
# After 2 minutes of inactivity, lock the session using the system
# session manager. This triggers hyprlock via the lock_cmd defined above.
listener {
    timeout = 120                                 # 2 minutes of inactivity
    on-timeout = loginctl lock-session            # Lock the current user session
}

# ─── Listener 3: Display Off (300s) ────────────────────────
# After 5 minutes of inactivity, turn off the monitor entirely via DPMS.
# The display is turned back on as soon as any input activity is detected.
listener {
    timeout = 300                                 # 5 minutes of inactivity
    on-timeout = hyprctl dispatch dpms off        # Cut power to the display via DPMS
    on-resume = hyprctl dispatch dpms on          # Restore display power on activity
}

# ─── Listener 4: Suspend System (900s) ─────────────────────
# After 15 minutes of inactivity, suspend the entire system to RAM.
# before_sleep_cmd (defined in general) will lock the session first.
listener {
    timeout = 900                                 # 15 minutes of inactivity
    on-timeout = systemctl suspend                # Suspend the system to RAM (S3 sleep state)
}
