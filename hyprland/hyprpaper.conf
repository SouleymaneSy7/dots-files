# ═══════════════════════════════════════════════════════════
# HYPRPAPER - Wallpaper Daemon Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Official wallpaper daemon for Hyprland. Defines the images
#   to preload and the wallpaper to display on each monitor.
#
# Location:
#   ~/.config/hypr/hyprpaper.conf
#
# Installation:
#   sudo pacman -S hyprpaper
#
# Usage:
#   hyprpaper
#   Launched automatically via exec-once in hyprland.conf
#
# Reload:
#   killall hyprpaper && hyprpaper &
#   or: hyprctl hyprpaper wallpaper "monitor,path"
#
# Pre-requisites:
#   Have a wallpaper image in ~/Pictures/
#   Update the preload + wallpaper paths below.
#
# Dependencies:
#   - hyprland   (compositor — required)
#
# See also:
#   hyprland/hyprland.conf  (autostart $wallpaper)
#
# Documentation:
#   https://wiki.hyprland.org/Hypr-Ecosystem/hyprpaper/

# ─── Preload ───────────────────────────────────────────────
# Loads the image into memory before assigning it to a monitor.
# Every image used as a wallpaper must be preloaded first.
# Add one preload entry per image file you intend to use.
preload = ~/Pictures/wallpaper.jpg

# ─── Wallpaper Assignment ──────────────────────────────────
# Assigns a preloaded image to a monitor as its wallpaper.
# Format: wallpaper = MONITOR_NAME, /path/to/image
# Leaving MONITOR_NAME empty applies the wallpaper to all monitors.
wallpaper = , ~/Pictures/wallpaper.jpg
