# ═══════════════════════════════════════════════════════════
# HYPRLAND - Wayland Compositor Configuration
# ═══════════════════════════════════════════════════════════
#
# Hyprland is a dynamic tiling Wayland compositor.
# This file configures monitors, keybindings, window rules,
# appearance, input devices, and autostarted processes.
# Full documentation: https://wiki.hyprland.org/Configuring/

# Disable the autogenerated config warning banner.
# Set to 1 to re-enable the warning on startup.
autogenerated = 0

################
### MONITORS ###
################
# Format: monitor=NAME,RESOLUTION,POSITION,SCALE
# "preferred" = use the monitor's native resolution.
# "auto" = automatically determine position and scale.
monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################
# Define program aliases used throughout this config.
# Changing a value here updates it everywhere it is referenced below.
$terminal     = ghostty                 # Terminal emulator
$fileManager  = thunar                  # Lightweight GTK file manager
$fileManager2 = dolphin                 # Full-featured KDE file manager (secondary)
$browser      = brave                   # Web browser
$editor       = nvim                    # Terminal text editor
$menu         = rofi -show drun         # Application launcher
$wallpaper    = hyprpaper               # Wallpaper daemon
$waybarMenu   = waybar                  # Status bar
$colorPicker  = hyprpicker              # Screen color picker

#################
### AUTOSTART ###
#################
# Programs launched automatically when Hyprland starts.
# exec-once = run only on first login, not on config reload.

exec-once = nm-applet                                        # Network Manager system tray applet
exec-once = $waybarMenu                                      # Status bar
exec-once = $wallpaper                                       # Wallpaper daemon
exec-once = /usr/lib/polkit-kde-authentication-agent-1       # Polkit authentication agent (GUI sudo prompts)
exec-once = /usr/bin/dunst                                   # Notification daemon
exec-once = wl-paste --type text --watch cliphist store      # Clipboard history: watch text entries
exec-once = wl-paste --type image --watch cliphist store     # Clipboard history: watch image entries
# exec-once = hypridle                                       # Idle manager (disabled; uncomment to enable)

#############################
### ENVIRONMENT VARIABLES ###
#############################

# ─── Cursor Size ───────────────────────────────────────────
env = XCURSOR_SIZE,24      # X11 cursor size in pixels
env = HYPRCURSOR_SIZE,24   # Hyprland native cursor size in pixels

# ─── QT Platform ───────────────────────────────────────────
# Ensure QT apps render natively on Wayland with XCB fallback.
env = QT_QPA_PLATFORM,wayland;xcb           # Prefer Wayland, fall back to X11
env = QT_QPA_PLATFORMTHEME,qt6ct            # Use qt6ct for QT theming
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 # Let the compositor draw window borders
env = QT_AUTO_SCREEN_SCALE_FACTOR,1         # Enable automatic HiDPI scaling for QT
env = QT_STYLE_OVERRIDE,kvantum             # Use Kvantum as the QT style engine

# ─── Toolkit Backend ───────────────────────────────────────
# Tell GTK, SDL, and Clutter to prefer the Wayland backend.
env = GDK_BACKEND,wayland,x11,*  # GTK: Wayland first, X11 fallback, then any
env = SDL_VIDEODRIVER,wayland     # SDL2: use Wayland video driver
env = CLUTTER_BACKEND,wayland     # Clutter: use Wayland backend

# ─── XDG Desktop Specification ─────────────────────────────
# Declare the current desktop environment to XDG-aware applications.
env = XDG_CURRENT_DESKTOP,Hyprland  # Identifies the running compositor
env = XDG_SESSION_TYPE,wayland      # Declares this as a Wayland session
env = XDG_SESSION_DESKTOP,Hyprland  # Used by portals and session managers

###################
### PERMISSIONS ###
###################
# Permission rules require a Hyprland restart to take effect.
# Uncomment the block below to enforce screencopy and plugin permissions.

# ecosystem {
#   enforce_permissions = 1
# }
# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4     # Inner gap between adjacent tiled windows (pixels)
    gaps_out = 10   # Outer gap between windows and the screen edge (pixels)
    border_size = 2 # Width of the window border in pixels

    # Active window border: diagonal gradient from blue to dark base and back.
    # Uses Catppuccin Macchiato blue (#8aadf4) and base (#24273A).
    col.active_border = rgb(8aadf4) rgb(24273A) rgb(24273A) rgb(8aadf4) 45deg

    # Inactive window border: uniform dark color, nearly invisible.
    col.inactive_border = rgb(24273A) rgb(24273A) rgb(24273A) rgb(27273A) 45deg

    resize_on_border = true  # Allow resizing by clicking and dragging borders or gaps
    allow_tearing = false    # Disable screen tearing optimization
    layout = dwindle         # Active tiling layout (recursive split)
}

decoration {
    rounding = 6       # Corner rounding radius in pixels for all windows
    rounding_power = 2 # Controls the curvature shape (2 = circular corners)

    active_opacity = 1.0    # Focused window: fully opaque
    inactive_opacity = 0.99 # Unfocused windows: slightly transparent

    shadow {
        enabled = false # Drop shadows disabled for a cleaner flat look
    }

    blur {
        enabled = false # Background blur disabled for performance
    }
}

animations {
    enabled = false # Animations disabled for a snappier, distraction-free experience
}

# ─── Dwindle Layout ────────────────────────────────────────
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true    # Windows tile in dwindle layout but retain their floating size
    preserve_split = true # Keep the split direction when a window is closed or moved
    force_split = 2      # Always split to the right/bottom
}

# ─── Master Layout ─────────────────────────────────────────
# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master # New windows are inserted as the master window
}

# ─── Miscellaneous ─────────────────────────────────────────
misc {
    force_default_wallpaper = 0  # Disable Hyprland's built-in anime mascot wallpaper
    disable_hyprland_logo = true # Disable the random Hyprland logo on the default background
    vfr = true                   # Variable frame rate: reduce GPU usage when idle
}

#############
### INPUT ###
#############

input {
    kb_layout  = fr  # Keyboard layout: French AZERTY
    kb_variant =     # No specific variant
    kb_model   =     # No specific model
    kb_options =     # No extra options
    kb_rules   =     # No custom rules

    follow_mouse = 1 # Focus follows mouse: focus window under cursor without clicking
    sensitivity = 0  # Mouse sensitivity multiplier (0 = no modification, range: -1.0 to 1.0)

    touchpad {
        natural_scroll = false # Standard scroll direction (not reversed)
    }
}

# ─── Per-Device Input Config ───────────────────────────────
# Overrides sensitivity for a specific named input device.
device {
    name = epic-mouse-v1
    sensitivity = -0.5 # Slower than default for this specific mouse
}

###################
### KEYBINDINGS ###
###################
# $mainMod maps to the Super (Windows) key.
$mainMod = SUPER

# ─── Application Launchers ─────────────────────────────────
bind = $mainMod, T, exec, $terminal       # Open terminal
bind = $mainMod, B, exec, $browser        # Open browser
bind = $mainMod, C, exec, $editor         # Open text editor
bind = $mainMod, Q, killactive,           # Close the focused window
bind = $mainMod, F, fullscreenstate, 3   # Toggle fullscreen (3 = fake fullscreen)
bind = $mainMod, E, exec, $fileManager    # Open primary file manager (Thunar)
bind = $mainMod, U, exec, $fileManager2   # Open secondary file manager (Dolphin)
bind = $mainMod, V, togglefloating,      # Toggle floating mode for focused window
bind = $mainMod, SPACE, exec, $menu      # Open application launcher
bind = $mainMod, P, exec, $colorPicker | wl-copy # Pick a screen color and copy it
bind = $mainMod, L, exec, hyprlock       # Lock the screen
bind = $mainMod, ESCAPE, exec, wlogout   # Open logout/power menu

# ─── Focus Movement (Vim-style) ────────────────────────────
# Move keyboard focus between tiled windows using h/j/k/l.
bind = $mainMod, h, movefocus, l  # Focus left
bind = $mainMod, l, movefocus, r  # Focus right
bind = $mainMod, k, movefocus, u  # Focus up
bind = $mainMod, j, movefocus, d  # Focus down

# ─── Window Movement (Vim-style) ───────────────────────────
# Move the focused window within the tiling layout or between groups.
bind = $mainMod SHIFT, h, movewindoworgroup, l  # Move window left
bind = $mainMod SHIFT, l, movewindoworgroup, r  # Move window right
bind = $mainMod SHIFT, k, movewindoworgroup, u  # Move window up
bind = $mainMod SHIFT, j, movewindoworgroup, d  # Move window down

# ─── Workspace Switching ───────────────────────────────────
# Switch to workspace 1-10 using mainMod + number keys.
# code:10 = key "1", code:11 = key "2", ..., code:19 = key "0"
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

# ─── Move Window to Workspace ──────────────────────────────
# Move the focused window to workspace 1-10 using mainMod + Shift + number.
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# ─── Workspace Scroll ──────────────────────────────────────
# Scroll through workspaces with the mouse wheel while holding mainMod.
bind = $mainMod, mouse_down, workspace, e+1  # Next workspace
bind = $mainMod, mouse_up, workspace, e-1    # Previous workspace

# ─── Mouse Window Controls ─────────────────────────────────
# bindm = hold modifier + drag with mouse button.
bindm = $mainMod, mouse:272, movewindow    # LMB drag: move window
bindm = $mainMod, mouse:273, resizewindow  # RMB drag: resize window

# ─── Media Playback Keys ───────────────────────────────────
# bindl = non-repeating bind. Requires playerctl (MPRIS media control).
bindl = , XF86AudioNext,  exec, playerctl next        # Skip to next track
bindl = , XF86AudioPause, exec, playerctl play-pause  # Toggle play/pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause  # Toggle play/pause
bindl = , XF86AudioPrev,  exec, playerctl previous    # Go to previous track
