# ═══════════════════════════════════════════════════════════
# HYPRPAPER - Wallpaper Daemon Configuration
# ═══════════════════════════════════════════════════════════
#
# Hyprpaper is the official wallpaper daemon for Hyprland.
# This file defines which images to preload into memory and
# which wallpaper to display on each monitor.
# Full documentation: https://wiki.hyprland.org/Hypr-Ecosystem/hyprpaper/

# ─── Preload ───────────────────────────────────────────────
# Loads the image into memory before assigning it to a monitor.
# Every image used as a wallpaper must be preloaded first.
# Add one preload entry per image file you intend to use.
preload = path/to/image

# ─── Wallpaper Assignment ──────────────────────────────────
# Assigns a preloaded image to a monitor as its wallpaper.
# Format: wallpaper = MONITOR_NAME, /path/to/image
# Leaving MONITOR_NAME empty applies the wallpaper to all monitors.
wallpaper = , path/to/image
