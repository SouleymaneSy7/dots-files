# ═══════════════════════════════════════════════════════════
# HYPRIDLE - Idle Daemon Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Idle daemon for Hyprland. Monitors user activity and
#   triggers actions at set intervals: dim screen → lock
#   → turn off display → suspend system.
#
# Location:
#   ~/.config/hypr/hypridle.conf
#
# Installation:
#   sudo pacman -S hypridle
#
# Usage:
#   hypridle
#   Or exec-once in hyprland.conf (currently disabled)
#
# Reload:
#   killall hypridle && hypridle &
#
# Timeline:
#   60s  → dim screen (brightnessctl set 5)
#   120s → lock screen (loginctl lock-session)
#   300s → display off (hyprctl dispatch dpms off)
#   900s → suspend (systemctl suspend)
#
# Dependencies:
#   - hyprland     (compositor)
#   - brightnessctl (brightness control)
#   - hyprlock     (screen locking)
#
# See also:
#   hyprland/hyprland.conf  (autostart — currently commented out)
#   hyprland/hyprlock.conf  (lock screen)
#
# Documentation:
#   https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

# ─── General Settings ──────────────────────────────────────
# Global behavior applied regardless of which listener fires.
general {
    # Prevent multiple hyprlock instances from spawning simultaneously.
    # pidof hyprlock checks if it is already running before launching a new one.
    lock_cmd = pidof hyprlock || hyprlock

    # Lock the session before the system suspends to sleep,
    # ensuring the screen is secured before power is cut.
    before_sleep_cmd = loginctl lock-session

    # Re-enable the display via DPMS after waking from sleep.
    # Without this, the user would need to press a key twice:
    # once to wake the system and once to turn the monitor back on.
    after_sleep_cmd = hyprctl dispatch dpms on
}

# ─── Listener 1: Dim Screen (60s) ──────────────────────────
# After 1 minute of inactivity, reduce the monitor backlight to near-minimum.
# A value above 0 avoids completely turning off OLED panels,
# which can cause issues with some OLED monitor firmware.
listener {
    timeout = 60
    on-timeout = brightnessctl -s set 5   # Save current brightness, then dim to 5%
    on-resume   = brightnessctl -r        # Restore the previously saved brightness on activity
}

# ─── Listener 2: Lock Screen (120s) ────────────────────────
# After 2 minutes of inactivity, lock the session via the system
# session manager. This triggers hyprlock through the lock_cmd defined above.
listener {
    timeout    = 120
    on-timeout = loginctl lock-session
}

# ─── Listener 3: Display Off (300s) ────────────────────────
# After 5 minutes of inactivity, cut power to the monitor via DPMS.
# The display is restored as soon as any input activity is detected.
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ─── Listener 4: Suspend System (900s) ─────────────────────
# After 15 minutes of inactivity, suspend the entire system to RAM.
# before_sleep_cmd (defined in general above) will lock the session first.
listener {
    timeout    = 900
    on-timeout = systemctl suspend
}
