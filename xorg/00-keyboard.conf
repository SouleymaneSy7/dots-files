
# ═══════════════════════════════════════════════════════════
# XKB - Keyboard Layout Configuration
# ═══════════════════════════════════════════════════════════
#
# Description:
#   Defines the available keyboard layouts for the system,
#   including the SDDM greeter. SDDM reads this file and
#   exposes the listed layouts in its language switcher.
#   French is the default layout (listed first).
#
# Location:
#   /etc/X11/xorg.conf.d/00-keyboard.conf
#
# Installation:
#   Copy to /etc/X11/xorg.conf.d/ (requires root).
#   Included in the dots-files repo for reference.
#
# Usage:
#   Applied automatically by Xorg on display start.
#   Switch between layouts with: Alt + Shift
#
# Reload:
#   setxkbmap -layout us  (switch without restart)
#   Full reload requires a logout/login or X restart.
#
# See also:
#   sddm/sddm.conf  (greeter keyboard settings)
#
# Documentation:
#   https://wiki.archlinux.org/title/Xorg/Keyboard_configuration

Section "InputClass"
    Identifier "system-keyboard"
    MatchIsKeyboard "on"

    # ─── Layouts ──────────────────────────────────────────
    # Comma-separated list of XKB layouts.
    # The first entry is the default (French).
    Option "XkbLayout"  "fr,us"

    # Variant for each layout (empty = default variant).
    # "," means: default French variant, default US variant.
    Option "XkbVariant" ","

    # ─── Model ────────────────────────────────────────────
    # Generic 105-key PC keyboard (covers most laptops and desktops).
    Option "XkbModel"   "pc105"

    # ─── Switch Shortcut ──────────────────────────────────
    # Alt + Shift toggles between fr and us.
    # Other options:
    #   grp:caps_toggle   → Caps Lock to switch
    #   grp:win_switch    → Super key to switch
    #   grp:ctrl_shift_toggle → Ctrl + Shift to switch
    Option "XkbOptions" "grp:alt_shift_toggle"
EndSection
